# Local Development Docker Compose
# Usage: docker-compose up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: ums-postgres
    environment:
      POSTGRES_DB: user_management
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d user_management"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ums-network

  # Redis Cache
  redis:
    image: redis:6.2
    container_name: ums-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redisdev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ums-network

  # PgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ums-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ums-network

  # Backend API (Optional - can also run locally)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ums-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://devuser:devpassword@postgres:5432/user_management
      REDIS_URL: redis://:redisdev@redis:6379/0
      JWT_SECRET_KEY: dev-jwt-secret-key-change-in-production
      DEBUG: "true"
      ENVIRONMENT: development
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    networks:
      - ums-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  ums-network:
    driver: bridge
